<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>StreamSuites · Login Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/overrides.css" />
  <link rel="stylesheet" href="/css/theme-dark.css" />
  <link rel="stylesheet" href="/css/updates.css" />

  <style>
    body {
      background: #0b0b0b;
      color: #eaeaea;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 32px;
      border-radius: 10px;
      background: #151515;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    h1 {
      margin-bottom: 12px;
      font-size: 1.6rem;
    }
    p {
      opacity: 0.85;
      line-height: 1.4;
    }
    .error {
      color: #ff8a80;
      margin-top: 16px;
    }
    .error-link {
      color: #ffb5b5;
      display: inline-block;
      margin-top: 8px;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Login successful</h1>
    <p>
      Your StreamSuites creator session has been established.<br />
      <span data-auth-status>Finalizing your session...</span>
    </p>
    <p class="error" data-auth-error hidden>
      <span data-auth-error-message></span>
      <a class="error-link" href="/login/">Return to login</a>
    </p>
  </div>
  <script>
    (() => {
      "use strict";

      const CREATOR_HOME_URL = "https://creator.streamsuites.app/";
      const SESSION_URL = new URL("/auth/session", CREATOR_HOME_URL).toString();
      const CREATOR_LOGIN_URL = "https://creator.streamsuites.app/login/";
      const CREATOR_ONBOARDING_URL = "https://creator.streamsuites.app/views/onboarding.html";
      const AUTH_PATHS = new Set([
        "/login",
        "/login/",
        "/login.html",
        "/login-success",
        "/login-success/",
        "/login-success.html"
      ]);
      const POST_AUTH_SETTLE_KEY = "streamsuites.creator.postAuthSettle";
      const SESSION_RETRY_DELAYS_MS = [180, 360, 720, 1280];
      const statusEl = document.querySelector("[data-auth-status]");
      const errorEl = document.querySelector("[data-auth-error]");
      const errorMessageEl = document.querySelector("[data-auth-error-message]");
      const pendingTimeouts = new Set();
      let activeController = null;
      let finalized = false;

      function setStatus(message) {
        if (statusEl) {
          statusEl.textContent = message;
        }
      }

      function showError(message) {
        cleanupPendingWork();
        if (!errorEl) return;
        if (errorMessageEl) {
          errorMessageEl.textContent = message;
        } else {
          errorEl.textContent = message;
        }
        errorEl.hidden = false;
      }

      function wait(ms) {
        return new Promise((resolve) => {
          const timeoutId = window.setTimeout(() => {
            pendingTimeouts.delete(timeoutId);
            resolve();
          }, ms);
          pendingTimeouts.add(timeoutId);
        });
      }

      function cleanupPendingWork() {
        pendingTimeouts.forEach((timeoutId) => {
          window.clearTimeout(timeoutId);
        });
        pendingTimeouts.clear();
        if (activeController) {
          activeController.abort();
          activeController = null;
        }
      }

      function normalizeReason(value) {
        if (typeof value !== "string") return "";
        const trimmed = value.trim().toLowerCase();
        if (!trimmed) return "";
        if (trimmed.includes("cookie_missing")) return "cookie_missing";
        return trimmed;
      }

      function normalizeCreatorReturnTarget(value, fallback = CREATOR_HOME_URL) {
        if (typeof value !== "string" || !value.trim()) return fallback;
        try {
          const parsed = new URL(value, CREATOR_HOME_URL);
          if (parsed.origin !== new URL(CREATOR_HOME_URL).origin) return fallback;
          if (AUTH_PATHS.has(parsed.pathname || "/")) return fallback;
          return `${parsed.origin}${parsed.pathname}${parsed.search}${parsed.hash}`;
        } catch (error) {
          return fallback;
        }
      }

      function getRequestedReturnTarget() {
        const params = new URLSearchParams(window.location.search);
        return normalizeCreatorReturnTarget(params.get("return_to") || "", CREATOR_HOME_URL);
      }

      function buildLoginUrl(reason = "") {
        const url = new URL(CREATOR_LOGIN_URL);
        url.searchParams.set("return_to", getRequestedReturnTarget());
        if (reason) {
          url.searchParams.set("reason", reason);
        }
        return url.toString();
      }

      function resolveReason(payload, response) {
        if (payload && typeof payload === "object") {
          const candidate =
            payload.reason ||
            payload.error?.reason ||
            payload.status ||
            payload.error ||
            payload.message;
          const normalized = normalizeReason(candidate);
          if (normalized) return normalized;
        }
        const headerReason =
          response?.headers &&
          ["x-auth-reason", "x-streamsuites-auth-reason", "x-auth-status"]
            .map((header) => response.headers.get(header))
            .find(Boolean);
        return normalizeReason(headerReason);
      }

      function resolveReasonEnum(payload, response) {
        if (payload && typeof payload === "object") {
          const candidate = payload.reason_enum || payload.error?.reason_enum;
          if (typeof candidate === "string" && candidate.trim()) {
            return candidate.trim().toUpperCase();
          }
        }
        const headerReasonEnum =
          response?.headers &&
          ["x-auth-reason-enum", "x-streamsuites-auth-reason-enum"]
            .map((header) => response.headers.get(header))
            .find(Boolean);
        if (typeof headerReasonEnum === "string" && headerReasonEnum.trim()) {
          return headerReasonEnum.trim().toUpperCase();
        }
        return "";
      }

      function isCookieMissing(response, payload) {
        if (!response || response.status !== 401) return false;
        const reasonEnum = resolveReasonEnum(payload, response);
        if (reasonEnum === "COOKIE_MISSING") return true;
        return resolveReason(payload, response) === "cookie_missing";
      }

      async function fetchSessionPayload() {
        if (activeController) {
          activeController.abort();
        }
        activeController = new AbortController();
        const response = await fetch(SESSION_URL, {
          credentials: "include",
          cache: "no-store",
          signal: activeController.signal
        });
        let payload = null;
        try {
          payload = await response.json();
        } catch (err) {
          payload = null;
        }
        activeController = null;
        return { response, payload };
      }

      async function confirmSession() {
        let lastResult = null;
        for (let attempt = 0; attempt <= SESSION_RETRY_DELAYS_MS.length; attempt += 1) {
          if (attempt > 0) {
            setStatus("Finalizing your session...");
            await wait(SESSION_RETRY_DELAYS_MS[attempt - 1]);
          }

          lastResult = await fetchSessionPayload();
          const { response, payload } = lastResult;
          const isSessionValid =
            response.ok === true &&
            (payload?.ok === true ||
              payload?.authenticated === true ||
              payload?.session_valid === true);
          if (isSessionValid) {
            return lastResult;
          }
          if (!isCookieMissing(response, payload)) {
            return lastResult;
          }
        }
        return lastResult;
      }

      function resolvePostAuthDestination(payload) {
        if (payload?.onboarding_required === true || payload?.onboardingRequired === true) {
          return CREATOR_ONBOARDING_URL;
        }
        return getRequestedReturnTarget();
      }

      function stagePostAuthRedirect(target, source = "callback") {
        const destination = normalizeCreatorReturnTarget(target, CREATOR_HOME_URL);
        try {
          sessionStorage.setItem(
            POST_AUTH_SETTLE_KEY,
            JSON.stringify({
              target: destination,
              source,
              createdAt: Date.now()
            })
          );
        } catch (err) {
          console.warn("[Creator][Auth] Failed to stage callback redirect", err);
        }
        return destination;
      }

      async function finalizeAuth() {
        if (finalized) return;
        finalized = true;
        const requestedReturnTo = getRequestedReturnTarget();
        console.info("[Creator][Auth] callback_landing", {
          landingUrl: window.location.href,
          continueTo: requestedReturnTo
        });
        setStatus("Confirming your session...");

        let sessionResult;
        try {
          sessionResult = await confirmSession();
        } catch (err) {
          showError("We could not confirm your session. Please try again.");
          return;
        }

        const { response, payload } = sessionResult || {};
        const isSessionValid =
          response?.ok === true &&
          (payload?.ok === true ||
            payload?.authenticated === true ||
            payload?.session_valid === true);

        if (isCookieMissing(response, payload)) {
          cleanupPendingWork();
          window.location.replace(buildLoginUrl("expired"));
          return;
        }

        if (!isSessionValid || response?.status === 401) {
          showError("We could not confirm your session. Please return to login.");
          return;
        }

        const destination = stagePostAuthRedirect(resolvePostAuthDestination(payload));
        console.info("[Creator][Auth] post_auth_navigate", {
          source: "callback",
          destination
        });
        setStatus("Session confirmed. Redirecting...");
        cleanupPendingWork();
        window.location.replace(destination);
      }

      window.addEventListener("pagehide", cleanupPendingWork, { once: true });
      document.addEventListener("DOMContentLoaded", finalizeAuth);
    })();
  </script>
</body>
</html>
